<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>모바일 청첩장</title>
<meta property="og:title" content="모바일 청첩장">
<meta property="og:description" content="결혼합니다. 귀한 걸음으로 축복해 주세요.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Gowun+Batang:wght@400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF7F3; --ink:#2B2621; --subtle:#6F655E;
    --bg:#F5E6E6; --accent:#C26B78; --accent-text:#873E4B; --card:#ffffff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--cream);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    -webkit-font-smoothing:antialiased}
  .serif{font-family:"Nanum Myeongjo","Apple SD Gothic Neo",Georgia,serif}
  .wrap{max-width:460px;margin:0 auto;padding:22px 18px 60px}
  .card{background:var(--bg);border-radius:24px;overflow:hidden;
    border:1px solid color-mix(in srgb,var(--accent) 25%,transparent);
    box-shadow:0 18px 50px rgba(0,0,0,.08)}
  .body{padding:30px 26px 34px;text-align:center;display:flex;flex-direction:column;gap:20px}
  .body.left{text-align:left;align-items:flex-start}

  /* 커버 스타일 */
  .cover-full{display:block;width:100%;height:300px;object-fit:cover;background:
    linear-gradient(180deg,color-mix(in srgb,var(--accent) 35%,transparent),var(--bg))}
  .cover-empty{display:flex;align-items:center;justify-content:center;font-size:52px;
    color:color-mix(in srgb,var(--accent) 60%,transparent)}
  .cover-arch{margin:26px 26px 0}
  .cover-arch .img{width:100%;height:270px;object-fit:cover;border-radius:200px 200px 14px 14px}
  .cover-framed{margin:20px}
  .cover-framed .img{width:100%;height:220px;object-fit:cover;border-radius:14px;
    border:1px solid color-mix(in srgb,var(--accent) 40%,transparent)}
  .cover-circle{display:flex;justify-content:center;margin-top:30px}
  .cover-circle .img{width:150px;height:150px;object-fit:cover;border-radius:50%;
    border:1px solid color-mix(in srgb,var(--accent) 40%,transparent)}
  .cover-polaroid{margin:30px 30px 6px;background:#fff;padding:12px;border-radius:4px;
    transform:rotate(-2deg);box-shadow:0 8px 20px rgba(0,0,0,.12)}
  .cover-polaroid .img{width:100%;height:220px;object-fit:cover;display:block}
  .cover-polaroid .pcap{text-align:center;margin-top:10px;font-size:15px;color:rgba(43,38,33,.7)}
  .cover-overlay{position:relative}
  .cover-overlay .img{width:100%;height:380px;object-fit:cover;display:block}
  .cover-overlay .grad{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.55))}
  .cover-overlay .otext{position:absolute;left:0;right:0;bottom:28px;text-align:center;color:#fff;
    text-shadow:0 2px 6px rgba(0,0,0,.35)}
  .cover-overlay .otext .nm{font-size:30px;font-weight:600}
  .cover-overlay .otext .dt{font-size:14px;margin-top:8px;opacity:.92}

  /* 텍스트 */
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:5px;color:var(--accent-text)}
  .names{font-weight:600;line-height:1.3}
  .rule{width:44px;height:1px;background:var(--accent);opacity:.6}
  .parents{font-size:13.5px;line-height:1.9;color:rgba(43,38,33,.7)}
  .gtitle{font-size:16px;font-weight:600}
  .greeting{font-size:15.5px;line-height:2;color:rgba(43,38,33,.82);white-space:pre-line}
  .closing{font-size:14px;font-weight:500;color:rgba(43,38,33,.7)}

  /* 갤러리 */
  .g-slider{display:flex;gap:10px;overflow-x:auto;margin:0 -4px;padding:0 4px 4px;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;width:100%}
  .g-slider figure{flex:0 0 auto;width:158px}
  .g-slider img{width:158px;height:210px;object-fit:cover;border-radius:14px;scroll-snap-align:center}
  .g-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
  .g-grid img{width:100%;height:150px;object-fit:cover;border-radius:10px}
  .g-vert{display:flex;flex-direction:column;gap:10px;width:100%}
  .g-vert img{width:100%;height:240px;object-fit:cover;border-radius:12px}
  figure{margin:0}
  figcaption{font-size:11px;color:rgba(43,38,33,.6);margin-top:4px;text-align:center}

  /* 정보/지도/계좌 */
  .info{width:100%;padding:16px;border-radius:14px;background:rgba(255,255,255,.55)}
  .info .when{font-size:16px;font-weight:600}
  .info .where{font-size:14px;margin-top:5px;color:rgba(43,38,33,.8)}
  .bigdate{width:100%}
  .bigdate .d{font-size:38px;font-weight:800;color:var(--accent);letter-spacing:.5px}
  .bigdate .w{font-size:14px;color:rgba(43,38,33,.7);margin-top:2px}
  .map{width:100%;border-radius:14px;overflow:hidden;border:0}
  .map iframe{display:block;width:100%;height:220px;border:0}
  .dirs{display:block;width:100%;margin-top:10px;padding:13px;border-radius:12px;text-decoration:none;
    background:rgba(255,255,255,.7);color:var(--accent-text);font-weight:600;font-size:14px;text-align:center}
  .account{width:100%;padding:16px;border-radius:14px;background:rgba(255,255,255,.55)}
  .account .h{font-size:13px;font-weight:600;letter-spacing:2px;color:var(--accent-text);text-align:center;margin-bottom:12px}
  .acc-row{display:flex;align-items:center;gap:10px;padding:6px 0}
  .acc-row .side{font-size:12px;font-weight:600;color:var(--accent-text);width:44px;flex:0 0 auto}
  .acc-row .val{font-size:13px;color:rgba(43,38,33,.85);flex:1;text-align:left}
  .acc-row button{border:0;background:transparent;color:var(--accent-text);font-size:15px;cursor:pointer}
  .contact{display:inline-block;padding:11px 20px;border-radius:999px;text-decoration:none;
    font-size:14px;font-weight:600;color:#fff;background:var(--accent-text)}
  .snapbox,.responsebox{margin-top:18px;background:#fff;border-radius:20px;padding:20px 18px;
    border:1px solid rgba(0,0,0,.06);box-shadow:0 10px 28px rgba(0,0,0,.05)}
  .snapbox h2,.responsebox h2{font-size:18px;margin-bottom:6px}
  .snapbox p,.responsebox p{font-size:13px;line-height:1.6;color:var(--subtle);margin-bottom:14px}
  .snapbox label,.responsebox>label{display:block;font-size:12px;font-weight:700;color:rgba(43,38,33,.76);margin:12px 0 6px}
  .snapbox input[type="text"],.snapbox textarea,.responsebox input[type="text"],.responsebox textarea,.responsebox select{width:100%;border:1px solid #E7DDD5;border-radius:12px;
    padding:12px;font:inherit;font-size:14px;background:#fff;color:var(--ink)}
  .snapbox textarea,.responsebox textarea{min-height:70px;resize:vertical}
  .invite-note{margin-top:18px;padding:22px 20px;border-radius:20px;background:color-mix(in srgb,var(--accent) 10%,#fff);text-align:center}
  .invite-note strong{display:block;font-size:16px;margin-bottom:8px;color:var(--accent-text)}
  .invite-note p{font-size:13px;line-height:1.75;color:rgba(43,38,33,.72)}
  .checkrow{display:flex;align-items:flex-start;gap:9px;margin-top:14px;font-size:14px;line-height:1.5;cursor:pointer}
  .checkrow input{margin-top:3px;width:18px;height:18px;accent-color:var(--accent)}
  .responsehint{font-size:11px!important;margin:7px 0 0 27px!important}
  .filepick{display:flex;align-items:center;justify-content:center;min-height:88px;border:1.5px dashed #D7C9C0;
    border-radius:14px;background:var(--cream);padding:12px;text-align:center;color:var(--subtle);font-size:13px}
  .filepick input{width:100%}
  .snapbtn,.responsebtn{width:100%;border:0;border-radius:14px;background:color-mix(in srgb,var(--accent) 72%,#000);color:#fff;font-weight:700;
    font-size:15px;padding:14px;margin-top:14px;cursor:pointer}
  .snapbtn:disabled,.responsebtn:disabled{opacity:.45;cursor:not-allowed}
  .snapstatus,.responsestatus{font-size:12px;color:var(--subtle);text-align:center;margin-top:10px;min-height:18px}
  /* RSVP 3버튼 원탭 */
  .rsvp-choices{display:flex;gap:8px;margin-top:6px}
  .rsvp-choice{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 6px;border-radius:16px;
    border:1.5px solid #E7DDD5;background:#fff;color:var(--ink);font:inherit;font-size:13px;font-weight:600;line-height:1.25;cursor:pointer;transition:.15s}
  .rsvp-choice .emo{font-size:24px}
  .rsvp-choice[aria-pressed="true"]{border-color:var(--accent-text);background:color-mix(in srgb,var(--accent) 14%,#fff);color:var(--accent-text)}
  #rsvpDetails{margin-top:2px}
  .rsvp-done-actions{display:flex;flex-direction:column;gap:9px;margin-top:16px}
  .rsvp-done-actions a{display:block;text-align:center;text-decoration:none;padding:13px;border-radius:12px;font-size:14px;font-weight:600;
    background:rgba(255,255,255,.7);color:var(--accent-text);border:1px solid #E7DDD5}
  /* 하단 고정 CTA */
  .rsvp-cta{position:sticky;bottom:0;left:0;right:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    background:linear-gradient(to top,var(--cream) 72%,rgba(251,247,243,0));z-index:20}
  .rsvp-cta button{width:100%;border:0;border-radius:14px;padding:15px;font:inherit;font-size:15px;font-weight:700;color:#fff;
    background:var(--accent-text);cursor:pointer;box-shadow:0 8px 22px rgba(0,0,0,.14)}
  .foot{text-align:center;color:var(--subtle);font-size:12px;margin-top:26px;line-height:1.7}
  .state{text-align:center;padding:80px 20px;color:var(--subtle)}
  .spin{width:26px;height:26px;border-radius:50%;margin:0 auto 14px;
    border:3px solid #e6ddd4;border-top-color:var(--accent);animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}

  /* 세리프 감성(명조) — 요즘 청첩장 톤. 이름·큰날짜·인사말제목에 적용 */
  .serif,.names,.gtitle,.bigdate .d,.cover-overlay .otext .nm,.cover-polaroid .pcap,.dday-num{
    font-family:"Nanum Myeongjo","Gowun Batang",Georgia,serif}

  /* 스크롤 리빌 — 사진·문구가 스르륵 등장 */
  .reveal{opacity:0;transform:translateY(18px);transition:opacity .8s ease,transform .8s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}
  /* 커버 인트로 */
  .card{animation:cardIn 1s ease both}
  @keyframes cardIn{from{opacity:0;transform:translateY(10px) scale(.985)}to{opacity:1;transform:none}}
  .cover-full,.cover-arch .img,.cover-framed .img,.cover-circle .img,.cover-polaroid .img,.cover-overlay .img{animation:coverIn 1.4s cubic-bezier(.2,.7,.2,1) both}
  @keyframes coverIn{from{opacity:0;transform:scale(1.06)}to{opacity:1;transform:none}}
  .cover-overlay .otext{animation:fadeUp 1s ease .5s both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* D-day 카운트다운 */
  .dday{margin-top:4px;text-align:center}
  .dday-num{font-size:34px;font-weight:800;color:var(--accent-text);line-height:1}
  .dday-label{font-size:12.5px;color:var(--subtle);margin-top:6px;letter-spacing:1px}

  /* 갤러리 라이트박스 */
  .g-slider figure,.g-grid figure,.g-vert figure{cursor:zoom-in}
  .lightbox{position:fixed;inset:0;background:rgba(20,16,14,.92);z-index:50;display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .25s ease;touch-action:pan-y}
  .lightbox.on{opacity:1;pointer-events:auto}
  .lightbox img{max-width:94vw;max-height:86vh;object-fit:contain;border-radius:6px;
    box-shadow:0 10px 40px rgba(0,0,0,.5);transition:transform .2s ease}
  .lb-close{position:absolute;top:calc(14px + env(safe-area-inset-top));right:16px;width:40px;height:40px;border:0;border-radius:50%;
    background:rgba(255,255,255,.16);color:#fff;font-size:22px;cursor:pointer}
  .lb-count{position:absolute;bottom:calc(18px + env(safe-area-inset-bottom));left:0;right:0;text-align:center;color:rgba(255,255,255,.85);font-size:13px}

  @media (prefers-reduced-motion: reduce){
    .reveal{opacity:1;transform:none;transition:none}
    .card,.cover-full,.cover-arch .img,.cover-framed .img,.cover-circle .img,.cover-polaroid .img,.cover-overlay .img,.cover-overlay .otext{animation:none}
  }
</style>
</head>
<body>
<div class="wrap" id="root">
  <div class="state"><div class="spin"></div>청첩장을 불러오는 중…</div>
</div>

<script>
// ── 설정 ─────────────────────────────────────────────────────────────────
const SUPABASE_URL  = "https://ksooqizjlahwhcahmiyh.supabase.co";
const SUPABASE_ANON = "sb_publishable_-LTIircJVb6dU0rxktPo1A_AmeJsEZH";
const BUCKET = "invitation-photos";
// ─────────────────────────────────────────────────────────────────────────

const TEMPLATES = {
  "블라썸": {bg:"#F5E6E6", accent:"#C26B78", text:"#873E4B"},
  "클래식": {bg:"#FAF7F0", accent:"#D1A359", text:"#76531B"},
  "모던":   {bg:"#F2F2F5", accent:"#2B2621", text:"#2B2621"},
};

const LAYOUTS = {
  "클래식":   {cover:"full",    align:"center", serif:true,  size:30, eyebrow:true},
  "아치":     {cover:"arch",    align:"center", serif:true,  size:30, eyebrow:true},
  "오버레이": {cover:"overlay", align:"center", serif:false, size:30, eyebrow:false},
  "미니멀":   {cover:"none",    align:"center", serif:true,  size:38, eyebrow:false},
  "폴라로이드":{cover:"polaroid",align:"center", serif:false, size:28, eyebrow:true},
  "매거진":   {cover:"full",    align:"left",   serif:true,  size:34, eyebrow:true},
  "모노그램": {cover:"circle",  align:"center", serif:true,  size:28, eyebrow:true},
  "필름":     {cover:"full",    align:"center", serif:false, size:28, eyebrow:true, gallery:"vertical"},
  "프레임":   {cover:"framed",  align:"center", serif:true,  size:28, eyebrow:true},
  "캘린더":   {cover:"full",    align:"center", serif:false, size:28, eyebrow:false, bigDate:true},
};

const root = document.getElementById("root");
const esc = s => (s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const pub = p => `${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${p}`;
const trim = s => (s ?? "").trim();

function fmtDate(iso){
  if(!iso) return "";
  const d = new Date(iso); if(isNaN(d)) return "";
  const wd = ["일","월","화","수","목","금","토"][d.getDay()];
  let h = d.getHours(); const m = d.getMinutes();
  const ap = h < 12 ? "오전" : "오후"; h = h % 12 || 12;
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${wd}) ${ap} ${h}시${m?` ${m}분`:""}`;
}
function numericDate(iso){ const d=new Date(iso); return isNaN(d)?"":`${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()}`; }
function weekdayTime(iso){
  const d=new Date(iso); if(isNaN(d)) return "";
  const wd=["일","월","화","수","목","금","토"][d.getDay()];
  let h=d.getHours(); const m=d.getMinutes(); const ap=h<12?"오전":"오후"; h=h%12||12;
  return `(${wd}) ${ap} ${h}시${m?` ${m}분`:""}`;
}
function parentsLine(f, m, order, child){
  f=trim(f); m=trim(m); if(!f && !m) return null;
  const p=[f,m].filter(Boolean).join(" · ");
  return `${p}의 ${order}${child?" "+esc(child):""}`;
}
function showState(msg){ root.innerHTML = `<div class="state">${msg}</div>`; }
window.copyAcc = (btn, text) => { navigator.clipboard?.writeText(text); btn.textContent="✓"; setTimeout(()=>btn.textContent="⧉",1200); };
let currentInvitationId = null;
const responseSubmissionId = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;

function coverHTML(spec, coverUrl, names, dateStr){
  const img = coverUrl
    ? `<img class="img" src="${coverUrl}" alt="">`
    : `<div class="img cover-empty" style="height:100%">🌷</div>`;
  switch(spec.cover){
    case "full":     return coverUrl ? `<img class="cover-full" src="${coverUrl}" alt="">` : `<div class="cover-full cover-empty">🌷</div>`;
    case "arch":     return `<div class="cover-arch">${img}</div>`;
    case "framed":   return `<div class="cover-framed">${img}</div>`;
    case "circle":   return `<div class="cover-circle">${img}</div>`;
    case "polaroid": return `<div class="cover-polaroid">${img}<div class="pcap">${names}</div></div>`;
    case "overlay":  return `<div class="cover-overlay">${img}<div class="grad"></div>
                       <div class="otext"><div class="nm">${names}</div><div class="dt">${dateStr}</div></div></div>`;
    case "none":     return "";
  }
  return "";
}

function galleryHTML(style, photos){
  if(!photos.length) return "";
  lbList = photos.map(p => p.url);   // 라이트박스용 전체 목록
  const cls = style==="그리드"?"g-grid":style==="세로"?"g-vert":"g-slider";
  const items = photos.map((p,i)=>{
    const cap = trim(p.caption) ? `<figcaption>${esc(p.caption)}</figcaption>` : "";
    return `<figure onclick="openLightbox(${i})"><img src="${p.url}" alt="" loading="lazy">${cap}</figure>`;
  }).join("");
  return `<div class="${cls}">${items}</div>`;
}

function render(row){
  currentInvitationId = row.id;
  window.__inviteRow = row;
  const ex = row.extra || {};
  const t = TEMPLATES[row.template] || TEMPLATES["블라썸"];
  document.documentElement.style.setProperty("--bg", t.bg);
  document.documentElement.style.setProperty("--accent", t.accent);
  document.documentElement.style.setProperty("--accent-text", t.text);

  const spec = LAYOUTS[ex.layout] || LAYOUTS["클래식"];
  const groom = esc(row.groom || "신랑"), bride = esc(row.bride || "신부");
  const namesStr = `${groom} · ${bride}`;
  document.title = `${groom} ♥ ${bride} 결혼합니다`;

  const coverUrl = row.cover_path ? pub(row.cover_path) : null;
  const dateFull = fmtDate(row.wedding_date);

  // 헤더(이름). 오버레이는 커버 안에 이름을 넣으므로 본문 헤더 생략.
  const nameStyle = `font-size:${spec.size}px;${spec.serif?'font-family:"Nanum Myeongjo",Georgia,serif;':''}`;
  let header = "";
  if(spec.cover !== "overlay"){
    header = `
      ${spec.eyebrow ? `<div class="eyebrow">결혼합니다</div>` : ""}
      <div class="names" style="${nameStyle}">${namesStr}</div>
      <div class="rule"></div>`;
  }

  // 혼주
  const gl = parentsLine(ex.groom_father, ex.groom_mother, ex.groom_order||"아들", row.groom);
  const bl = parentsLine(ex.bride_father, ex.bride_mother, ex.bride_order||"딸", row.bride);
  const parents = (gl||bl) ? `<div class="parents">${[gl,bl].filter(Boolean).join("<br>")}</div>` : "";

  // 멘트
  const gtitle = trim(ex.greeting_title) ? `<div class="gtitle" style="${spec.serif?'font-family:\"Nanum Myeongjo\",serif;':''}">${esc(ex.greeting_title)}</div>` : "";
  const closing = trim(ex.closing) ? `<div class="closing">${esc(ex.closing)}</div>` : "";

  // 갤러리
  const paths = row.photo_paths || [];
  const caps = ex.captions || [];
  const photos = paths.map((p,i)=>({url:pub(p), caption:caps[i]||""}));
  const gstyle = trim(ex.gallery_style) || (spec.gallery==="vertical" ? "세로" : "슬라이더");
  const gallery = galleryHTML(gstyle, photos);

  // 큰 날짜(캘린더)
  const bigdate = spec.bigDate ? `<div class="bigdate"><div class="d">${numericDate(row.wedding_date)}</div><div class="w">${weekdayTime(row.wedding_date)}</div></div>` : "";

  // 정보(날짜는 캘린더면 생략)
  const where = [row.venue_name, row.venue_hall].filter(Boolean).map(esc).join(" ");
  const info = `<div class="info">${spec.bigDate?"":`<div class="when">${dateFull}</div>`}${where?`<div class="where">${where}</div>`:""}</div>`;

  // 지도
  let map = "";
  if(row.show_map && row.venue_lat && row.venue_lng){
    const la=row.venue_lat, ln=row.venue_lng;
    const bbox=`${ln-0.004},${la-0.003},${ln+0.004},${la+0.003}`;
    // 길찾기는 카카오맵으로 — 한국은 구글 지도 자동차 경로안내가 막혀 있다.
    const dest=encodeURIComponent(row.venue_name||"예식장");
    map = `<div class="map"><iframe loading="lazy" src="https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${la},${ln}"></iframe></div>
      <a class="dirs" href="https://map.kakao.com/link/to/${dest},${la},${ln}" target="_blank" rel="noopener">📍 길찾기</a>`;
  } else if(row.venue_address){
    map = `<div class="info"><div class="where">${esc(row.venue_address)}</div></div>`;
  }

  // 계좌
  let account = "";
  const ga=trim(ex.groom_account), ba=trim(ex.bride_account);
  if(ga||ba){
    const rowFor=(side,val)=>`<div class="acc-row"><span class="side">${side}</span><span class="val">${esc(val)}</span><button onclick="copyAcc(this,'${esc(val).replace(/'/g,"\\'")}')">⧉</button></div>`;
    account = `<div class="account"><div class="h">마음 전하실 곳</div>${ga?rowFor("신랑측",ga):""}${ba?rowFor("신부측",ba):""}</div>`;
  }

  const contact = trim(row.contact_phone) ? `<a class="contact" href="tel:${esc(row.contact_phone)}">📞 연락하기</a>` : "";
  const comfortable = ex.delivery_style === "부담 없이 모바일로";
  const inviteNote = comfortable ? `
    <section class="invite-note">
      <strong>만나고 싶어서 만나는 자리만 남겨요</strong>
      <p>청첩장을 전하려고 따로 자리를 마련해야 한다는 부담 없이, 모바일로 먼저 기쁜 소식을 전해요. 초대하는 마음은 그대로 담았습니다.</p>
    </section>` : "";
  const responseForm = `
    <section class="responsebox" id="responseBox">
      <h2>참석 여부 알려주기</h2>
      <p>버튼만 눌러도 충분해요. 답변은 신랑신부에게만 전달됩니다.</p>
      <div class="rsvp-choices" role="group" aria-label="참석 여부">
        <button type="button" class="rsvp-choice" data-rsvp="attending" aria-pressed="false" onclick="pickRsvp('attending')"><span class="emo">🎉</span>기쁘게<br>참석</button>
        <button type="button" class="rsvp-choice" data-rsvp="pending" aria-pressed="false" onclick="pickRsvp('pending')"><span class="emo">🗓️</span>일정<br>확인 후</button>
        <button type="button" class="rsvp-choice" data-rsvp="declined" aria-pressed="false" onclick="pickRsvp('declined')"><span class="emo">💐</span>축하<br>마음만</button>
      </div>
      <div id="rsvpDetails" hidden>
        <div id="attendeeWrap" hidden aria-live="polite">
          <label for="responseCount">참석 인원 (본인 포함)</label>
          <select id="responseCount">${Array.from({length:10},(_,i)=>`<option value="${i+1}">${i+1}명</option>`).join("")}</select>
        </div>
        <label for="responseName">이름</label>
        <input id="responseName" type="text" maxlength="30" autocomplete="name" aria-describedby="responseStatus" placeholder="예) 지훈">
        <label class="checkrow"><input id="responseMeeting" type="checkbox"><span>결혼 전에 따로 만나고 싶어요</span></label>
        <label for="responseMessage">축하 한마디 (선택)</label>
        <textarea id="responseMessage" maxlength="200" placeholder="따뜻한 축하 한마디를 남겨주세요"></textarea>
        <button class="responsebtn" id="responseButton" onclick="submitInvitationResponse()">응답 보내기</button>
      </div>
      <div class="responsestatus" id="responseStatus" role="status" aria-live="polite"></div>
    </section>`;
  const snapUpload = `
    <section class="snapbox">
      <h2>친구 스냅 보내기</h2>
      <p>아이폰 스냅을 따로 부르지 않아도 괜찮도록, 오늘 찍은 자연스러운 순간을 신랑신부에게 보내주세요. 베스트컷은 작은 선물 후보가 됩니다.</p>
      <label for="snapName">이름</label>
      <input id="snapName" type="text" maxlength="30" placeholder="예) 지훈">
      <label for="snapMessage">한마디 (선택)</label>
      <textarea id="snapMessage" maxlength="120" placeholder="예) 신부대기실 사진 너무 예뻐서 보냅니다"></textarea>
      <label for="snapFiles">사진</label>
      <div class="filepick"><input id="snapFiles" type="file" accept="image/*" multiple></div>
      <button class="snapbtn" id="snapButton" onclick="submitGuestSnaps()">사진 보내기</button>
      <div class="snapstatus" id="snapStatus"></div>
    </section>`;

  root.innerHTML = `
    <div class="card">
      ${coverHTML(spec, coverUrl, namesStr, dateFull)}
      <div class="body ${spec.align==='left'?'left':''}">
        ${header}
        ${bigdate}
        ${parents}
        ${gtitle}
        <div class="greeting">${esc(row.greeting || "")}</div>
        ${closing}
        ${gallery}
        ${info}
        ${ddayHTML(row.wedding_date)}
        ${map}
        ${account}
        ${contact}
      </div>
    </div>
    ${inviteNote}
    ${responseForm}
    ${snapUpload}
    <div class="foot">노머니웨딩 · 이 청첩장은 예식 후에도 사라지지 않습니다</div>
    <div class="rsvp-cta" id="rsvpCta"><button type="button" onclick="scrollToRsvp()">💌 참석 여부 알려주기</button></div>`;
  setupReveal();
}

/// 예식일까지 남은 날짜 카운트다운.
function ddayHTML(iso){
  const d = new Date(iso); if(isNaN(d.getTime())) return "";
  const today = new Date(); today.setHours(0,0,0,0);
  const wd = new Date(d); wd.setHours(0,0,0,0);
  const days = Math.round((wd - today) / 86400000);
  const num = days > 0 ? `D-${days}` : days === 0 ? "D-DAY" : `D+${-days}`;
  const label = days > 0 ? `결혼식까지 ${days}일 남았어요`
    : days === 0 ? "오늘, 결혼합니다" : `함께한 지 ${-days}일`;
  return `<div class="dday"><div class="dday-num">${num}</div><div class="dday-label">${label}</div></div>`;
}

// 스크롤 리빌 — 커버를 제외한 섹션이 뷰포트에 들어올 때 스르륵 등장.
function setupReveal(){
  const reduce = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;
  const targets = document.querySelectorAll(".body > *, .invite-note, .responsebox, .snapbox");
  if(reduce || !("IntersectionObserver" in window)){
    targets.forEach(el => el.classList.add("in")); return;
  }
  targets.forEach(el => el.classList.add("reveal"));
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); } });
  }, { threshold: 0.12, rootMargin: "0px 0px -8% 0px" });
  targets.forEach(el => io.observe(el));
}

// 갤러리 라이트박스 — 사진 탭 확대 + 좌우 스와이프.
let lbList = [], lbIndex = 0;
window.openLightbox = (i) => {
  if(!lbList.length) return;
  lbIndex = i;
  let lb = document.getElementById("lightbox");
  if(!lb){
    lb = document.createElement("div");
    lb.id = "lightbox"; lb.className = "lightbox";
    lb.innerHTML = `<button class="lb-close" aria-label="닫기" onclick="closeLightbox()">✕</button><img alt=""><div class="lb-count"></div>`;
    lb.addEventListener("click", (e) => { if(e.target === lb) closeLightbox(); });
    let sx = 0;
    lb.addEventListener("touchstart", (e) => { sx = e.touches[0].clientX; }, {passive:true});
    lb.addEventListener("touchend", (e) => {
      const dx = e.changedTouches[0].clientX - sx;
      if(dx < -40) lbShow(lbIndex + 1); else if(dx > 40) lbShow(lbIndex - 1);
    }, {passive:true});
    document.body.appendChild(lb);
  }
  lbShow(i);
  requestAnimationFrame(() => lb.classList.add("on"));
};
function lbShow(i){
  lbIndex = (i + lbList.length) % lbList.length;
  const lb = document.getElementById("lightbox");
  lb.querySelector("img").src = lbList[lbIndex];
  lb.querySelector(".lb-count").textContent = lbList.length > 1 ? `${lbIndex + 1} / ${lbList.length}` : "";
}
window.closeLightbox = () => { document.getElementById("lightbox")?.classList.remove("on"); };

let selectedRsvp = "";
// 참석 여부 버튼 원탭 — 선택 즉시 상세(이름·인원·한마디·보내기) 공개.
window.pickRsvp = (value) => {
  selectedRsvp = value;
  document.querySelectorAll(".rsvp-choice").forEach(btn => {
    btn.setAttribute("aria-pressed", String(btn.dataset.rsvp === value));
  });
  const details = document.getElementById("rsvpDetails");
  if(details) details.hidden = false;
  const wrap = document.getElementById("attendeeWrap");
  if(wrap) wrap.hidden = value !== "attending";
  document.getElementById("responseStatus").textContent = "";
  const name = document.getElementById("responseName");
  if(name && !name.value) setTimeout(() => name.focus(), 60);
};

window.scrollToRsvp = () => {
  document.getElementById("responseBox")?.scrollIntoView({ behavior: "smooth", block: "start" });
};

async function submitInvitationResponse(){
  const status = document.getElementById("responseStatus");
  const button = document.getElementById("responseButton");
  if(!selectedRsvp){ status.textContent = "참석 여부를 먼저 눌러주세요."; return; }
  const name = trim(document.getElementById("responseName").value);
  const nameInput = document.getElementById("responseName");
  if(!name){
    nameInput.setAttribute("aria-invalid", "true");
    status.textContent = "이름을 입력해 주세요.";
    nameInput.focus();
    return;
  }
  nameInput.removeAttribute("aria-invalid");
  const rsvp = selectedRsvp;
  const row = {
    id: responseSubmissionId,
    invitation_id: currentInvitationId,
    guest_name: name,
    rsvp,
    attendee_count: rsvp === "attending" ? Number(document.getElementById("responseCount").value) : 1,
    wants_meeting: document.getElementById("responseMeeting").checked,
    message: trim(document.getElementById("responseMessage").value)
  };
  button.disabled = true;
  status.textContent = "응답을 보내는 중…";
  try{
    const result = await fetch(`${SUPABASE_URL}/rest/v1/invitation_responses`, {
      method:"POST",
      headers:{apikey:SUPABASE_ANON, "Content-Type":"application/json", Prefer:"resolution=ignore-duplicates,return=minimal"},
      body:JSON.stringify(row)
    });
    if(!result.ok) throw new Error(await result.text());
    const box = document.getElementById("responseBox");
    box.innerHTML = `<div role="status" tabindex="-1" id="responseSuccess"><h2>마음을 전했어요</h2><p>${esc(name)}님의 응답이 신랑신부에게 도착했습니다. 고마워요.</p>${rsvp === "declined" ? "" : rsvpDoneActions()}</div>`;
    document.getElementById("responseSuccess").focus();
    const cta = document.getElementById("rsvpCta"); if(cta) cta.remove();
  }catch(e){
    status.textContent = "응답을 보내지 못했어요. 잠시 후 다시 시도해 주세요.";
    button.disabled = false;
  }
}

// 응답 후 하객에게 되돌려주는 무료 보상: 예식 일정 캘린더 추가 + 길찾기.
function rsvpDoneActions(){
  const row = window.__inviteRow || {};
  let out = "";
  const start = new Date(row.wedding_date);
  if(!Number.isNaN(start.getTime())){
    const end = new Date(start.getTime() + 2*60*60*1000);
    const fmt = (d) => d.toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
    const place = [row.venue_name, row.venue_hall].filter(Boolean).join(" ");
    const ics = ["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",
      `UID:${currentInvitationId}@nomoney.wedding`,
      `DTSTART:${fmt(start)}`,`DTEND:${fmt(end)}`,
      `SUMMARY:${(row.groom||"신랑")} ♥ ${(row.bride||"신부")} 결혼식`,
      `LOCATION:${(place+" "+(row.venue_address||"")).trim().replace(/,/g,"\\,")}`,
      "END:VEVENT","END:VCALENDAR"].join("\r\n");
    const href = "data:text/calendar;charset=utf-8," + encodeURIComponent(ics);
    out += `<a href="${href}" download="wedding.ics">📅 예식 일정 캘린더에 추가</a>`;
  }
  if(row.venue_lat && row.venue_lng){
    const dest = encodeURIComponent(row.venue_name || "예식장");
    out += `<a href="https://map.kakao.com/link/to/${dest},${row.venue_lat},${row.venue_lng}" target="_blank" rel="noopener">📍 예식장 길찾기</a>`;
  }
  return out ? `<div class="rsvp-done-actions">${out}</div>` : "";
}

async function compressImage(file){
  const bitmap = await loadImageBitmap(file);
  const maxEdge = 1800;
  const scale = Math.min(1, maxEdge / Math.max(bitmap.width, bitmap.height));
  const canvas = document.createElement("canvas");
  canvas.width = Math.round(bitmap.width * scale);
  canvas.height = Math.round(bitmap.height * scale);
  const ctx = canvas.getContext("2d");
  ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
  const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg", .82));
  if(!blob) throw new Error("image encode failed");
  return blob;
}

async function loadImageBitmap(file){
  if("createImageBitmap" in window){
    try{ return await createImageBitmap(file); }catch(e){}
  }
  return await new Promise((resolve, reject)=>{
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

async function uploadSnapObject(path, blob){
  const r = await fetch(`${SUPABASE_URL}/storage/v1/object/${BUCKET}/${path}`, {
    method:"POST",
    headers:{apikey:SUPABASE_ANON, "Content-Type":"image/jpeg"},
    body:blob
  });
  if(!r.ok) throw new Error(await r.text());
}

async function insertSnapRow(row){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/guest_snaps`, {
    method:"POST",
    headers:{apikey:SUPABASE_ANON, "Content-Type":"application/json", Prefer:"return=minimal"},
    body:JSON.stringify(row)
  });
  if(!r.ok) throw new Error(await r.text());
}

async function submitGuestSnaps(){
  const status = document.getElementById("snapStatus");
  const button = document.getElementById("snapButton");
  const files = Array.from(document.getElementById("snapFiles").files || []);
  const name = trim(document.getElementById("snapName").value) || "이름 없는 친구";
  const message = trim(document.getElementById("snapMessage").value);
  if(!currentInvitationId) return;
  if(!files.length){ status.textContent = "보낼 사진을 먼저 골라주세요."; return; }
  button.disabled = true;
  try{
    let done = 0;
    const targets = files.slice(0, 10);
    for(const file of targets){
      status.textContent = `사진 준비 중... ${done}/${targets.length}`;
      const blob = await compressImage(file);
      const key = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const path = `${currentInvitationId}/guest-snaps/${key}.jpg`;
      await uploadSnapObject(path, blob);
      await insertSnapRow({invitation_id:currentInvitationId, guest_name:name, message, photo_path:path});
      done += 1;
      status.textContent = `업로드 중... ${done}/${targets.length}`;
    }
    status.textContent = "사진이 도착했어요. 고마워요!";
    document.getElementById("snapFiles").value = "";
    document.getElementById("snapMessage").value = "";
  }catch(e){
    status.textContent = "업로드에 실패했어요. 잠시 후 다시 시도해 주세요.";
  }finally{
    button.disabled = false;
  }
}

async function load(){
  const id = new URLSearchParams(location.search).get("id");
  if(!id) return showState("잘못된 링크예요.");
  if(SUPABASE_URL.includes("YOUR_PROJECT")) return showState("아직 준비 중이에요.");
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/invitations?id=eq.${encodeURIComponent(id)}&select=*`,
      {headers:{apikey:SUPABASE_ANON}});
    if(!r.ok) throw new Error(r.status);
    const rows = await r.json();
    if(!rows.length) return showState("청첩장을 찾을 수 없어요.");
    render(rows[0]);
  }catch(e){ showState("불러오지 못했어요. 잠시 후 다시 시도해 주세요."); }
}
load();
